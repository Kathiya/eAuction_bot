# Polls eAuctions, sends Telegram for new listings, writes data/listings_cache.json.
# Schedule is UTC (GitHub Actions). Example: 0 */3 * * * = every 3 hours on the hour.
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN   — required for notifications
#   TELEGRAM_CHAT_ID     — comma-separated chat IDs
#   LISTING_SEARCH_URLS  — optional; pipe-separated search URLs
# Optional env vars can be added to the "Run monitor" step if needed, e.g. HTTP_VERIFY_SSL=false,
# NOTIFY_ON_FIRST_RUN=true (avoid empty-string secrets for booleans — omit or set explicit values).
#
# The bot commit uses [skip ci] so the push does not re-trigger this workflow.

name: Auction poll

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LISTING_SEARCH_URLS: ${{ secrets.LISTING_SEARCH_URLS }}
        run: python -m project.main run-once

      - name: Commit cache if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/listings_cache.json
          if git diff --staged --quiet; then
            echo "No cache changes to commit."
          else
            git commit -m "chore: update listings cache [skip ci]"
            git push origin HEAD
          fi
